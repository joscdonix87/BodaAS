<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
  margin:0;
  background:#f4efe6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Georgia', serif;
}

.wrapper{
  position:relative;
  width:340px;
  height:230px;
  perspective:1000px;
  cursor:pointer;
}

.envelope{
  position:absolute;
  width:100%;
  height:100%;
  background:#1f5f3b;
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#174a2c;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  border-radius:8px;
}

.letter{
  position:absolute;
  width:92%;
  height:92%;
  background:#fffaf0;
  top:4%;
  left:4%;
  border-radius:12px;
  padding:25px;
  box-sizing:border-box;
  transform: translateY(60%);
  opacity:0;
  overflow:auto;
  text-align:center;
  position:relative;
}

.letter::before,
.letter::after{
  content:"🌹";
  position:absolute;
  font-size:28px;
}

.letter::before{
  top:10px;
  left:15px;
}

.letter::after{
  bottom:10px;
  right:15px;
}

h3{
  color:#1f5f3b;
  margin-bottom:10px;
}

button{
  background:#b22222;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  background:#8b1a1a;
}
</style>
</head>

<body>

<div class="wrapper" id="sobre">
  <div class="envelope"></div>
  <div class="flap"></div>
  <div class="letter" id="contenido">
    Cargando invitación...
  </div>
</div>

<script>

/// 🔥 AQUI DEBES PONER TU URL DE APPS SCRIPT (LA QUE TERMINA EN /exec)
const scriptURL = "https://script.google.com/macros/s/AKfycbx0Hec0C0748rPbNQIUI5nQieWK1VJTjT1VPkeyEeNK0y6DUdEEicy-bpRe_8Sc6JHp/exec";

const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");

if(codigo){

  fetch(scriptURL + "?codigo=" + codigo)
  .then(res => res.json())
  .then(data => {

      document.getElementById("contenido").innerHTML = `
        <h3>Querida ${data.familia}</h3>
        <p>Nos complace invitarles a nuestra boda</p>
        <p><strong>Cupos:</strong> ${data.cantidad}</p>
        <hr>
        <p>⛪ Ceremonia 3:00 PM</p>
        <p>🎉 Recepción 4:00 PM</p>
        <button onclick="confirmar('${codigo}')">Confirmar asistencia</button>
      `;

  })
  .catch(error => {
      document.getElementById("contenido").innerHTML = "Error al cargar invitación";
  });

} else {
  document.getElementById("contenido").innerHTML = "Falta código en la URL";
}


// 🔥 FUNCIÓN CONFIRMAR
function confirmar(codigo){
  fetch(scriptURL + "?confirmar=" + codigo)
  .then(res => res.json())
  .then(data => {
     alert("Asistencia confirmada correctamente");
  });
}


// 🔥 ANIMACIÓN GSAP
let opened = false;

document.getElementById("sobre").addEventListener("click", function(){

  if(opened) return;
  opened = true;

  const tl = gsap.timeline();

  tl.to(".wrapper", {
    y:-20,
    duration:0.6,
    ease:"power2.out"
  });

  tl.to(".flap", {
    rotationX:-180,
    duration:1,
    ease:"power2.inOut"
  }, "-=0.4");

  tl.to(".letter", {
    y:-50,
    opacity:1,
    duration:1,
    ease:"power2.out"
  }, "-=0.6");

});

</script>

</body>
</html>
