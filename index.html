<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
  margin:0;
  background:#f5eee6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Georgia, serif;
}

.wrapper{
  position:relative;
  width:320px;
  height:220px;
  perspective:1000px;
}

.envelope{
  position:absolute;
  width:100%;
  height:100%;
  background:#c59d5f;
  border-radius:6px;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#b68c4b;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
}

.letter{
  position:absolute;
  width:90%;
  height:90%;
  background:white;
  top:5%;
  left:5%;
  border-radius:10px;
  padding:20px;
  box-sizing:border-box;
  transform: translateY(60%);
  opacity:0;
  overflow:auto;
}

button{
  background:#c59d5f;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper" id="sobre">
  <div class="envelope"></div>
  <div class="flap"></div>
  <div class="letter" id="contenido">
    Cargando invitación...
  </div>
</div>

<script>

// 🔹 TU URL AQUI
const scriptURL = "PEGA_AQUI_TU_URL_DEL_APP_SCRIPT";

let invitadoData = null;

const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");

if(!codigo){
  document.body.innerHTML = "<h2>Invitación no válida</h2>";
}

fetch(scriptURL + "?codigo=" + codigo)
.then(res => res.json())
.then(data => {

  if(!data.valido){
    document.body.innerHTML = "<h2>Invitación no válida</h2>";
    return;
  }

  invitadoData = data;

  document.getElementById("contenido").innerHTML = `
    <h3>Querida Familia ${data.familia}</h3>
    <p><strong>Cupos:</strong> ${data.cantidad}</p>
    <hr>
    <p>⛪ 3:00 PM</p>
    <p>🎉 4:00 PM</p>
    <br>
    <button id="confirmarBtn" onclick="confirmar()">Confirmar asistencia</button>
  `;

  if(String(data.confirmado).trim().toUpperCase() === "SI"){
    const btn = document.getElementById("confirmarBtn");
    btn.innerText = "Ya confirmado 💕";
    btn.disabled = true;
  }

});

// 🔥 ANIMACIÓN GSAP
let opened = false;

document.getElementById("sobre").addEventListener("click", function(){

  if(opened) return;
  opened = true;

  const tl = gsap.timeline();

  tl.to(".wrapper", {
    y:-20,
    duration:0.6,
    ease:"power2.out"
  });

  tl.to(".flap", {
    rotationX:-180,
    duration:1,
    ease:"power2.inOut"
  }, "-=0.4");

  tl.to(".letter", {
    y:-40,
    opacity:1,
    duration:1,
    ease:"power2.out"
  }, "-=0.6");

});

function confirmar(){
  fetch(scriptURL + "?confirmar=" + codigo)
  .then(res => res.json())
  .then(data => {
    if(data.ok){
      const btn = document.getElementById("confirmarBtn");
      btn.innerText = "Ya confirmado 💕";
      btn.disabled = true;
    }
  });
}

</script>

</body>
</html>
