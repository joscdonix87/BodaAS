<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación A & S</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-sobre: #4a6741;
            --verde-oscuro: #364d30;
            --crema: #fdfaf0;
            --blanco: #ffffff;
            --dorado-suave: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e8e4d9; /* Fondo de página neutro */
            font-family: 'Playfair Display', serif;
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            width: 450px;
            height: 300px;
        }

        /* El Sobre */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--verde-sobre);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: visible;
        }

        /* Solapa superior (Triángulo) */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 160px solid var(--verde-oscuro);
            transform-origin: top;
            z-index: 4;
        }

        /* Cuerpo del sobre (partes frontales para dar profundidad) */
        .envelope::before {
            content: "";
            position: absolute;
            z-index: 3;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-bottom: 150px solid var(--verde-sobre);
            bottom: 0;
            left: 0;
        }

        .envelope::after {
            content: "";
            position: absolute;
            z-index: 3;
            border-left: 150px solid var(--verde-oscuro);
            border-top: 150px solid transparent;
            border-bottom: 150px solid transparent;
            left: 0;
            top: 0;
        }

        .right-flap {
            position: absolute;
            z-index: 3;
            border-right: 150px solid var(--verde-oscuro);
            border-top: 150px solid transparent;
            border-bottom: 150px solid transparent;
            right: 0;
            top: 0;
        }

        /* La Invitación (Carta) */
        .card {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 260px;
            background-color: var(--crema);
            z-index: 2;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            border: 2px solid var(--dorado-suave);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--verde-oscuro);
            margin: 0;
        }

        .card p {
            font-size: 1.1rem;
            color: #555;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card .divider {
            width: 50px;
            height: 1px;
            background: var(--dorado-suave);
            margin: 15px auto;
        }

        /* Sello de lacre */
        .seal {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: var(--crema);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--verde-oscuro);
            font-size: 0.8rem;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelopeContainer">
        <div class="flap"></div>
        <div class="seal">A & S</div>
        <div class="envelope">
            <div class="right-flap"></div>
            <div class="card">
                <h1>A & S</h1>
                <div class="divider"></div>
                <p>Estás Invitado</p>
                <small>Nuestra Boda</small>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const container = document.getElementById('envelopeContainer');
        const tl = gsap.timeline({ paused: true });

        // Definimos la secuencia de animación
        tl.to(".flap", {
            duration: 0.6,
            rotationX: 180,
            ease: "power2.inOut",
            z: 10
        })
        .to(".seal", {
            duration: 0.4,
            opacity: 0,
            y: -20,
            ease: "power2.in"
        }, "-=0.4")
        .to(".card", {
            duration: 1,
            y: -180, // Sube la carta para que se vea
            scale: 1.05,
            ease: "back.out(1.2)"
        }, "-=0.1");

        // Eventos para abrir/cerrar al hacer clic
        let isOpen = false;
        container.addEventListener('click', () => {
            if (!isOpen) {
                tl.play();
            } else {
                tl.reverse();
            }
            isOpen = !isOpen;
        });
    </script>
</body>
</html>
