<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
body{
  margin:0;
  font-family: 'Georgia', serif;
  background:#f5eee6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* SOBRE */
.envelope-wrapper{
  position:relative;
  width:300px;
  height:200px;
  cursor:pointer;
}

.envelope{
  width:100%;
  height:100%;
  background:#c59d5f;
  position:absolute;
  bottom:0;
  border-radius:5px;
}

.flap{
  position:absolute;
  top:0;
  width:100%;
  height:100%;
  background:#b68c4b;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: transform 0.6s ease;
}

.letter{
  position:absolute;
  width:90%;
  height:90%;
  background:white;
  top:5%;
  left:5%;
  border-radius:10px;
  padding:20px;
  box-sizing:border-box;
  transform: translateY(100%);
  transition: transform 0.6s ease;
  overflow:auto;
}

.open .flap{
  transform: rotateX(180deg);
}

.open .letter{
  transform: translateY(0);
}

button{
  background:#c59d5f;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
}

button:disabled{
  background:gray;
}
</style>
</head>

<body>

<div class="envelope-wrapper" id="sobre">
  <div class="envelope"></div>
  <div class="flap"></div>
  <div class="letter" id="contenido">
    Cargando invitación...
  </div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbz9eBPKaLDZe_h-6FgxfxYHwI_zise80KY782p66L3nT4HwVGdFAZYqdKjp7gzqtLXR/exec";

let invitadoData = null;

const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");

if(!codigo){
  document.body.innerHTML = "<h2>Invitación no válida</h2>";
}

fetch(scriptURL + "?codigo=" + codigo)
.then(res => res.json())
.then(data => {

  if(!data.valido){
    document.body.innerHTML = "<h2>Invitación no válida</h2>";
    return;
  }

  invitadoData = data;

  document.getElementById("contenido").innerHTML = `
    <h3>Querida Familia ${data.familia}</h3>
    <p><strong>Cupos reservados:</strong> ${data.cantidad}</p>
    <hr>
    <p>⛪ Ceremonia: 3:00 PM</p>
    <p>🎉 Recepción: 4:00 PM</p>
    <br>
    <button id="confirmarBtn" onclick="confirmar()">Confirmar asistencia</button>
  `;

  if(String(data.confirmado).trim().toUpperCase() === "SI"){
    const btn = document.getElementById("confirmarBtn");
    btn.innerText = "Ya confirmado 💕";
    btn.disabled = true;
  }

})
.catch(error => {
  document.getElementById("contenido").innerHTML = "Error al cargar invitación";
});

function confirmar(){
  fetch(scriptURL + "?confirmar=" + codigo)
  .then(res => res.json())
  .then(data => {
    if(data.ok){
      const btn = document.getElementById("confirmarBtn");
      btn.innerText = "Ya confirmado 💕";
      btn.disabled = true;
    }
  });
}

/* ABRIR SOBRE */
document.getElementById("sobre").addEventListener("click", function(){
  this.classList.toggle("open");
});

</script>

</body>
</html>
